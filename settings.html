<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTrack – Settings</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <i class="fas fa-book-open-reader"></i>
    <span>StudyTrack</span>
  </div>
  <a class="nav-item" href="index.html"><i class="fas fa-house"></i> Dashboard</a>
  <a class="nav-item" href="subject.html"><i class="fas fa-layer-group"></i> Subjects</a>
  <a class="nav-item" href="tasks.html"><i class="fas fa-list-check"></i> Tasks</a>
  <a class="nav-item" href="calendar.html"><i class="fas fa-calendar-days"></i> Calendar</a>
  <a class="nav-item" href="notes.html"><i class="fas fa-note-sticky"></i> Notes</a>
  <a class="nav-item" href="flashcards.html"><i class="fas fa-clone"></i> Flashcards</a>
  <a class="nav-item" href="resources.html"><i class="fas fa-bookmark"></i> Resources</a>
  <a class="nav-item" href="progress.html"><i class="fas fa-chart-line"></i> Progress</a>
  <a class="nav-item" href="goals.html"><i class="fas fa-bullseye"></i> Goals</a>
  <a class="nav-item active" href="settings.html"><i class="fas fa-gear"></i> Settings</a>
  <div class="sidebar-bottom">
    <div class="avatar">S</div>
    <div class="avatar-info">
      <span>Student</span>
      <small>View Profile</small>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main">

  <!-- SETTINGS PAGE -->
  <div class="page active" id="page-settings">

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1><i class="fas fa-gear" style="color:#4f46e5;margin-right:8px"></i>Settings</h1>
        <p>Manage your account and preferences.</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active"><i class="fas fa-user" style="margin-right:5px"></i>Profile</div>
      <div class="tab"><i class="fas fa-sliders" style="margin-right:5px"></i>Preferences</div>
      <div class="tab"><i class="fas fa-bell" style="margin-right:5px"></i>Notifications</div>
      <div class="tab"><i class="fas fa-palette" style="margin-right:5px"></i>Appearance</div>
    </div>

    <!-- Settings Body: two columns -->
    <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start">

      <!-- Left: Profile Information -->
      <div class="settings-section" style="margin-bottom:0">
        <h3><i class="fas fa-user" style="color:#4f46e5;margin-right:6px"></i>Profile Information</h3>

        <div class="form-group" style="margin-bottom:14px">
          <label>Name</label>
          <input type="text" value="Alex">
        </div>

        <div class="form-group" style="margin-bottom:14px">
          <label>Email</label>
          <input type="email" value="alex@example.com">
        </div>

        <div class="form-group" style="margin-bottom:14px">
          <label>Timezone</label>
          <select style="padding:9px 12px;border:1px solid #e8eaf0;border-radius:8px;font-size:13px;outline:none;width:100%">
            <option>UTC-5 (EST)</option>
            <option>UTC+0 (GMT)</option>
            <option>UTC+1 (CET)</option>
          </select>
        </div>

        <div class="form-group" style="margin-bottom:20px">
          <label>Language</label>
          <select style="padding:9px 12px;border:1px solid #e8eaf0;border-radius:8px;font-size:13px;outline:none;width:100%">
            <option>English</option>
            <option>Spanish</option>
            <option>French</option>
          </select>
        </div>

        <button class="btn btn-primary">
          <i class="fas fa-floppy-disk"></i> Save Changes
        </button>
      </div>

      <!-- Right: Account Actions -->
      <div class="settings-section" style="margin-bottom:0">
        <h3><i class="fas fa-lock" style="color:#6b7280;margin-right:6px"></i>Account</h3>

        <!-- Change Password -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f3f4f6">
          <div style="display:flex;align-items:center;gap:10px">
            <i class="fas fa-key" style="color:#4f46e5;width:16px"></i>
            <span style="font-size:14px;font-weight:500">Change Password</span>
          </div>
          <i class="fas fa-chevron-right" style="color:#d1d5db;font-size:13px"></i>
        </div>

        <!-- Export Data -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f3f4f6">
          <div style="display:flex;align-items:center;gap:10px">
            <i class="fas fa-file-export" style="color:#4f46e5;width:16px"></i>
            <span style="font-size:14px;font-weight:500">Export Data</span>
          </div>
          <i class="fas fa-chevron-right" style="color:#d1d5db;font-size:13px"></i>
        </div>

        <!-- Delete Account -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0">
          <div style="display:flex;align-items:center;gap:10px">
            <i class="fas fa-trash" style="color:#ef4444;width:16px"></i>
            <span style="font-size:14px;font-weight:500;color:#ef4444">Delete Account</span>
          </div>
          <i class="fas fa-chevron-right" style="color:#d1d5db;font-size:13px"></i>
        </div>
      </div>

    </div><!-- end card -->

  </div><!-- end page -->

</main>

<script src="js/scrpit.js"></script>
</body>
</html>
